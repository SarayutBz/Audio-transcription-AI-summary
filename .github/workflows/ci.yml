name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install backend deps
        run: npm install
        working-directory: backend

      - name: Test backend
        run: npm test
        working-directory: backend

      - name: Install frontend deps
        run: npm install
        working-directory: frontend/voxnoto-ai

      - name: Test frontend
        run: npm test
        working-directory: frontend/voxnoto-ai

      - name: Build frontend
        run: npm run build
        working-directory: frontend/voxnoto-ai
